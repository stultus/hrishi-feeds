name: poll

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Push as the PAT user so downstream workflows (dispatch.yml) see the
          # commit. Pushes authenticated with the default GITHUB_TOKEN do not
          # trigger other workflows — that's a GitHub Actions safeguard.
          token: ${{ secrets.SITE_DEPLOY_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync

      - name: Poll Letterboxd
        env:
          LETTERBOXD_USERNAME: ${{ secrets.LETTERBOXD_USERNAME }}
        run: uv run scripts/poll_letterboxd.py

      - name: Poll Goodreads
        env:
          GOODREADS_USER_ID: ${{ secrets.GOODREADS_USER_ID }}
          GOODREADS_RSS_KEY: ${{ secrets.GOODREADS_RSS_KEY }}
        run: uv run scripts/poll_goodreads.py

      - name: Commit changes
        run: |
          if git diff --quiet -- data/; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: feeds update"
          git push
