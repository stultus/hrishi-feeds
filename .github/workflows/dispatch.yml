name: dispatch

on:
  push:
    branches: [main]
    paths:
      - "data/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - stultus/stultus.in
          - stultus/notes-hugo
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_DEPLOY_PAT }}
          repository: ${{ matrix.repo }}
          event-type: feeds-updated
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
